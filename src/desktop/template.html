<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zone Planner — council land-use solitaire</title>
<script>
// Small touch screens get the finger-native mobile build, unless the player
// opted out with ?desktop (remembered thereafter). Runs before anything
// renders so the redirect is invisible. Relative path works from the site
// root too, since index.html is a copy of this file.
(function(){
  try {
    if(new URLSearchParams(location.search).has("desktop")){
      localStorage.setItem("zp-force-desktop", "1");
      return;
    }
    if(localStorage.getItem("zp-force-desktop")) return;
  } catch(e){ /* no URLSearchParams / storage — just fall through */ }
  if(window.matchMedia &&
     window.matchMedia("(max-width: 760px) and (pointer: coarse)").matches){
    location.replace("zone-planner.mobile.html");
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
{{STYLES}}
</style>
</head>
<body>

<header>
  <h1>Zone<span class="dot">Planner</span></h1>
  <span class="tagline">council land-use solitaire</span>
  <span class="spacer"></span>
  <a href="zone-planner.mobile.html">Mobile version</a>
  <button id="undoBtn">Undo</button>
  <button id="newBtn">New year</button>
</header>

<div class="layout">
  <div class="side">
    <div class="panel">
      <h2>The mayor's plan</h2>
      <div id="plan"></div>
    </div>
  </div>

  <div class="main">
    <div class="toprow">
      <div class="panel build-panel">
        <h2>This turn's build</h2>
        <div id="build"></div>
        <div class="turnline" id="turnline"></div>
      </div>

      <div class="panel total-row">
        <span class="label">Total score</span>
        <span class="value" id="total">0</span>
      </div>
    </div>

    <div class="board-wrap">
      <div id="board" aria-label="11 by 11 block of land"></div>
      <div class="hint"><b>R</b> rotate · <b>F</b> flip · click the land to build · ▲ mountains are unbuildable</div>
    </div>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h2>Annual review</h2>
    <div class="sub" id="overSub"></div>
    <div id="overLines"></div>
    <div class="grand"><span>Final score</span><span class="pts" id="overTotal"></span></div>
    <button id="againBtn">Plan another year</button>
  </div>
</div>

<script>
{{GAME_JS}}
</script>
</body>
</html>
