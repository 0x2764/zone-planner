<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zone Planner — council land-use solitaire</title>
<!-- PWA: installable, offline-capable. Paths are relative so they work under the
     GitHub Pages sub-path (/zone-planner/) and wherever the build is copied. -->
<meta name="theme-color" content="#E9E0CA">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Zone Planner">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
{{STYLES}}
</style>
</head>
<body>

<header>
  <h1>Zone<span class="dot">Planner</span></h1>
  <span class="tagline">council land-use solitaire</span>
  <span class="spacer"></span>
  <button id="rulesBtn">Rules</button>
  <button id="undoBtn">Undo</button>
  <button id="newBtn">New year</button>
</header>

<div class="layout">
  <div class="side">
    <div class="panel">
      <h2>The mayor's plan</h2>
      <div id="plan"></div>
    </div>
  </div>

  <div class="main">
    <div class="toprow">
      <div class="panel build-panel">
        <h2 id="buildTitle">This turn's build</h2>
        <div id="build"></div>
        <div class="turnline" id="turnline"></div>
      </div>

      <div class="panel total-row">
        <span class="label">Total score</span>
        <span class="value" id="total">0</span>
      </div>
    </div>

    <div class="board-wrap">
      <div id="board" aria-label="11 by 11 block of land"></div>
      <div class="hint">tap the land to reveal placements · tap again to narrow · tap the shape to build · ▲ mountains are unbuildable</div>
    </div>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h2>Annual review</h2>
    <div class="sub" id="overSub"></div>
    <div id="overLines"></div>
    <div class="grand"><span>Final score</span><span class="pts" id="overTotal"></span></div>
    <button id="againBtn">Plan another year</button>
  </div>
</div>

<div class="overlay hidden" id="rulesOverlay">
  <div class="modal rules-modal">
    <div class="rules-content">{{RULES_HTML}}</div>
    <button id="rulesCloseBtn">Close</button>
  </div>
</div>

<!-- Register the offline service worker. Feature-detected and guarded so opening
     the lone self-contained HTML from file:// (where SWs and sibling files don't
     exist) still boots the game normally. -->
<script>
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>

<script>
{{GAME_JS}}
</script>
</body>
</html>
